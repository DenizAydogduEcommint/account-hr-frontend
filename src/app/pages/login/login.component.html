<div class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="login__brand">
      <span class="login__mark">AH</span>
      <span class="login__title">account-hr</span>
    </div>
    <p class="login__subtitle">E-Commint · Ön Muhasebe</p>

    <div class="field">
      <label class="field__label" for="email">E-posta</label>
      <input
        id="email"
        class="field__input"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="ad@e-commint.com"
        [class.field__input--invalid]="hasError('email')"
      />
      @if (hasError('email')) {
        <span class="field__error">Geçerli bir e-posta girin.</span>
      }
    </div>

    <div class="field">
      <label class="field__label" for="password">Parola</label>
      <input
        id="password"
        class="field__input"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="••••••••"
        [class.field__input--invalid]="hasError('password')"
      />
      @if (hasError('password')) {
        <span class="field__error">Parola zorunludur.</span>
      }
    </div>

    @if (errorMessage()) {
      <div class="login__alert" role="alert">{{ errorMessage() }}</div>
    }

    <button class="login__submit" type="submit" [disabled]="pending()">
      @if (pending()) {
        <span class="spinner" aria-hidden="true"></span>
        Giriş yapılıyor…
      } @else {
        Giriş yap
      }
    </button>
  </form>
</div>
