<div class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="login__brand">
      <img class="login__mark" src="assets/logo.png" alt="accounting HR" />
      <span class="login__title">accounting HR</span>
    </div>
    <p class="login__subtitle">E-Commint · Ön Muhasebe</p>

    <div class="field">
      <label class="field__label" for="email">E-posta</label>
      <input
        id="email"
        class="field__input"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="ad@e-commint.com"
        [class.field__input--invalid]="hasError('email')"
      />
      @if (hasError('email')) {
        <span class="field__error">Geçerli bir e-posta girin.</span>
      }
    </div>

    <div class="field">
      <label class="field__label" for="password">Parola</label>
      <div class="field__password">
        <input
          id="password"
          class="field__input"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [class.field__input--invalid]="hasError('password')"
        />
        <button
          type="button"
          class="field__eye"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword() ? 'Parolayı gizle' : 'Parolayı göster'"
          tabindex="-1"
        >
          @if (showPassword()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          }
        </button>
      </div>
      @if (hasError('password')) {
        <span class="field__error">Parola zorunludur.</span>
      }
    </div>

    @if (errorMessage()) {
      <div class="login__alert" role="alert">{{ errorMessage() }}</div>
    }

    <button class="login__submit" type="submit" [disabled]="pending()">
      @if (pending()) {
        <span class="spinner" aria-hidden="true"></span>
        Giriş yapılıyor…
      } @else {
        Giriş yap
      }
    </button>
  </form>
</div>
