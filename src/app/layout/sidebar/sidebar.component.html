<aside class="sidebar">
  <div class="brand">
    <img class="brand__mark" src="assets/logo.png" alt="accounting HR" />
    <span class="brand__name">accounting HR</span>
  </div>

  <nav class="nav">
    @for (item of nav; track item.label) {
      @if (item.path) {
        <!-- Gerçek route (routerLink + aktif vurgu) -->
        <a
          class="nav__link"
          [routerLink]="item.path"
          routerLinkActive="nav__link--active"
        >
          <span class="nav__icon">{{ item.icon }}</span>
          <span class="nav__label">{{ item.label }}</span>
        </a>
      } @else {
        <!-- Yakında gelecek E3 ekranları (placeholder, routerLink yok) -->
        <span class="nav__link nav__link--disabled" title="Yakında">
          <span class="nav__icon">{{ item.icon }}</span>
          <span class="nav__label">{{ item.label }}</span>
          <span class="nav__soon">yakında</span>
        </span>
      }
    }
  </nav>

  <div class="sidebar__footer">E-Commint · Ön Muhasebe</div>
</aside>
